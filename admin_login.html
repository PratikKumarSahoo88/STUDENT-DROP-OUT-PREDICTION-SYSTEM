<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(-45deg, #ee7752, #e73c7e); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif;}
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 450px; padding: 40px; background: white;}
    </style>
</head>
<body>
    <div class="card">
        <h2 class="fw-bold text-danger text-center mb-4">👨‍🏫 Admin Login</h2>
        
        {% if error %}
            <div class="alert alert-danger text-center small fw-bold">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="alert alert-success text-center small fw-bold">{{ success }}</div>
        {% endif %}

        <form action="/admin_auth" method="POST">
            <div class="mb-3">
                <label class="fw-bold">Faculty ID</label>
                <input type="text" name="faculty_id" class="form-control" placeholder="Enter ID" required>
            </div>
            <div class="mb-4">
                <label class="fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
            
            <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-bold mb-3">Secure Login 🔐</button>
        </form>
        
        <div class="text-center mt-2">
            <p class="small text-muted mb-1">New Faculty Member?</p>
            <a href="/admin_register" class="btn btn-outline-danger btn-sm rounded-pill w-100">Create an Account</a>
        </div>
        <div class="text-center"><a href="/" class="text-muted mt-4 d-block small">🔙 Back to Home</a></div>
    </div>
</body>
</html>

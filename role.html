<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Dropout Prediction System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37); padding: 40px; width: 100%; max-width: 800px; text-align: center; }
        .role-btn { border-radius: 15px; padding: 30px; transition: transform 0.3s, box-shadow 0.3s; background: white; text-decoration: none; color: #333; display: block; }
        .role-btn:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .icon { font-size: 4rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="glass-card animate__animated animate__zoomIn">
        <h1 class="text-white fw-bold mb-3">🎓 Dropout Prediction System</h1>
        <p class="text-white mb-5 lead">Select your portal to continue</p>
        <div class="row g-4">
            <div class="col-md-6">
                <a href="/student_login" class="role-btn">
                    <div class="icon">👨‍🎓</div>
                    <h3 class="fw-bold text-primary">Student Portal</h3>
                    <p class="text-muted mb-0">View your academic diagnosis</p>
                </a>
            </div>
            <div class="col-md-6">
                <a href="/admin_login" class="role-btn">
                    <div class="icon">👨‍🏫</div>
                    <h3 class="fw-bold text-danger">Faculty Admin</h3>
                    <p class="text-muted mb-0">Enter marks & manage class</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
